services:
    app:
        build:
            context: .
            dockerfile: Dockerfile.dev
        container_name: nuxt-enterprise-template-dev
        ports:
            - '${PORT:-3000}:${PORT:-3000}'
        env_file:
            - .env
        volumes:
            - ./:/app
            - /app/node_modules
        depends_on:
            db:
                condition: service_healthy

    db:
        image: postgres:16-alpine
        container_name: nuxt-enterprise-template-db
        environment:
            POSTGRES_DB: app_db
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres -d app_db']
            interval: 5s
            timeout: 5s
            retries: 10

volumes:
    postgres_data:
