services:
    app:
        build:
            context: .
            dockerfile: Dockerfile.dev
        container_name: nuxt-enterprise-template-dev
        ports:
            - '${PORT:-3000}:${PORT:-3000}'
        env_file:
            - .env
        environment:
            DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-app_db}?schema=public
        volumes:
            - ./:/app
            - /app/node_modules
        depends_on:
            db:
                condition: service_healthy

    db:
        build:
            context: .
            dockerfile: docker/db/Dockerfile
        image: rua-solicitudes-postgres:16-alpine
        container_name: nuxt-enterprise-template-db
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-app_db}
            POSTGRES_USER: ${POSTGRES_USER:-postgres}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
        ports:
            - '${POSTGRES_PORT:-5432}:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
            interval: 5s
            timeout: 5s
            retries: 10

volumes:
    postgres_data:
