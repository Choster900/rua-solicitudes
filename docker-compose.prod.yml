services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
            args:
                DATABASE_URL: ${DATABASE_URL}
                SUPABASE_URL: ${SUPABASE_URL}
                SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
                SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
                NUXT_PUBLIC_APP_NAME: ${NUXT_PUBLIC_APP_NAME}
                NUXT_PUBLIC_APP_URL: ${NUXT_PUBLIC_APP_URL}
                NODE_ENV: production
        container_name: nuxt-enterprise-template-prod
        ports:
            - '${PORT:-3000}:${PORT:-3000}'
        env_file:
            - .env
        environment:
            NODE_ENV: production
            DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-app_db}?schema=public
        restart: unless-stopped
        depends_on:
            db:
                condition: service_healthy

    db:
        build:
            context: .
            dockerfile: docker/db/Dockerfile
        image: rua-solicitudes-postgres:16-alpine
        container_name: nuxt-enterprise-template-db-prod
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-app_db}
            POSTGRES_USER: ${POSTGRES_USER:-postgres}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
        ports:
            - '${POSTGRES_PORT:-5432}:5432'
        volumes:
            - postgres_data_prod:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
            interval: 5s
            timeout: 5s
            retries: 10
        restart: unless-stopped

volumes:
    postgres_data_prod:
